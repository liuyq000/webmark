<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 本地书签</title>
    <link href="/css/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%234f6ef7' d='M2 2v13l6-3 6 3V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z'/%3E%3C/svg%3E">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <a href="/index.html" class="header-logo">
                <i class="bi bi-bookmark-star-fill"></i> <span>本地书签</span>
            </a>
        </div>
        <div class="header-right">
            <div class="header-home-search">
                <input type="text" id="searchInput" placeholder="搜索书签..." onkeydown="if(event.key==='Enter')doSearch()">
            </div>
        </div>
    </header>
    <div class="container" style="margin-top:80px;max-width:800px">
        <div id="searchResults"></div>
    </div>
    <script>
    var params = new URLSearchParams(window.location.search);
    var key = params.get('key') || '';
    if (key) {
        document.getElementById('searchInput').value = key;
        fetch('/api/search?key=' + encodeURIComponent(key)).then(function(r) { return r.json(); }).then(function(d) {
            var html = '<h5>找到 <strong>' + d.total + '</strong> 个结果</h5>';
            (d.results || []).forEach(function(b) {
                html += '<div class="card mb-2"><div class="card-body py-2"><a href="' + b.url + '" target="_blank" class="text-decoration-none"><strong>' + b.title + '</strong></a><div class="small text-muted">' + (b.description || '') + '</div></div></div>';
            });
            document.getElementById('searchResults').innerHTML = html;
        });
    }
    function doSearch() {
        var q = document.getElementById('searchInput').value.trim();
        if (q) window.location.href = '/search.html?key=' + encodeURIComponent(q);
    }
    </script>
</body>
</html>
