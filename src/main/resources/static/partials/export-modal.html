<!-- 导出书签弹窗 -->
<div id="_exportModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1060;">
    <div class="bm-form-content" style="max-width:640px;">
        <div class="bm-header">
            <h5><i class="bi bi-download me-2"></i>导出收藏夹</h5>
            <button type="button" class="bm-header-close" onclick="document.getElementById('_exportModal').remove()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="bm-form-body">
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">将书签导出为浏览器兼容的文件格式。</p>
            <div class="bm-field">
                <label>导出格式</label>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                    <label class="bm-toggle-label"><input type="radio" name="_exportFmt" value="html" checked> <span>HTML</span></label>
                    <label class="bm-toggle-label"><input type="radio" name="_exportFmt" value="csv"> <span>CSV</span></label>
                    <label class="bm-toggle-label"><input type="radio" name="_exportFmt" value="json"> <span>JSON</span></label>
                </div>
            </div>
        </div>
        <div class="bm-footer">
            <button class="bm-btn bm-btn-secondary" onclick="document.getElementById('_exportModal').remove()">取消</button>
            <button class="bm-btn bm-btn-primary" onclick="mgrDoExport()"><i class="bi bi-download"></i> 确认导出</button>
        </div>
    </div>
</div>
