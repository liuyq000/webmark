<!-- 用户管理主面板 -->
<div id="_mgmtModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1050;">
    <div class="user-mgmt-content">
        <div class="bm-header">
            <h5><i class="bi bi-people-fill me-2"></i>用户管理</h5>
            <button type="button" class="bm-header-close" onclick="closeUserMgmt()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="user-mgmt-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <button class="bm-btn bm-btn-primary" onclick="openUserEditModal()"><i class="bi bi-person-plus me-1"></i>新建用户</button>
            </div>
            <div class="user-card">
                <div class="user-card-header">
                    <span class="page-info-text" id="userTotalText">共 0 个用户</span>
                    <div style="display:flex;align-items:center;gap:6px">
                        <i class="bi bi-search" style="color:#999"></i>
                        <input type="text" id="userSearchInput" placeholder="搜索用户名..." style="padding:5px 10px;border:1px solid var(--border-color);border-radius:5px;font-size:13px;width:190px;outline:none" oninput="userSearchInput()">
                    </div>
                </div>
                <div class="user-card-body">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th style="width:50px">ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th style="width:80px">角色</th>
                                <th style="width:150px">创建时间</th>
                                <th style="width:110px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="6" style="text-align:center;padding:30px;color:#999">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="user-card-footer">
                    <span class="page-info-text" id="userPageInfo">第 0-0 条，共 0 条</span>
                    <div id="userPaginationHtml"></div>
                </div>
            </div>
        </div>
    </div>
</div>
