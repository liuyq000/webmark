<!-- 书签管理主面板 -->
<div id="_mgmtModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1050;">
    <div class="mgmt-modal-content">
        <div class="bm-header">
            <h5><i class="bi bi-bookmarks me-2"></i>书签管理</h5>
            <button type="button" class="bm-header-close" onclick="closeMgmtModal()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="mgmt-modal-body">
            <div class="mgmt-tree-panel">
                <div class="tree-header d-flex justify-content-between align-items-center pe-2">
                    <span><i class="bi bi-folder2-open"></i> 文件夹</span>
                    <button class="mgmt-btn mgmt-btn-primary" style="padding:2px 6px;font-size:11px" onclick="mgrAddTopFolder()" title="新增顶级文件夹"><i class="bi bi-plus"></i></button>
                </div>
                <div class="py-1" id="mgrTreeContainer"></div>
            </div>
            <div class="mgmt-table-panel">
                <div class="mgmt-toolbar" style="gap:6px">
                    <input class="mgmt-search-input" id="mgrKeyword" placeholder="搜索标题/URL" onkeydown="if(event.key==='Enter')mgrLoadBookmarks()">
                    <select id="mgrPublicType" onchange="mgrLoadBookmarks()">
                        <option value="">全部类型</option>
                        <option value="1">公开</option>
                        <option value="0">私密</option>
                    </select>
                    <button class="mgmt-btn" onclick="mgrLoadBookmarks()"><i class="bi bi-search"></i></button>
                    <button class="mgmt-btn" onclick="mgrResetSearch()">重置</button>
                    <span class="bookmark-count" id="mgrCountLabel" style="margin-left:auto">共 0 条</span>
                </div>
                <div class="mgmt-toolbar mgmt-toolbar-actions" style="padding:6px 14px">
                    <button class="mgmt-btn" onclick="mgrOpenImport()"><i class="bi bi-upload"></i> 导入收藏夹</button>
                    <button class="mgmt-btn" onclick="mgrOpenExport()"><i class="bi bi-download"></i> 导出收藏夹</button>
                    <button class="mgmt-btn" onclick="mgrOpenIcons()"><i class="bi bi-emoji-smile"></i> 图标管理</button>
                    <button class="mgmt-btn mgmt-btn-success" onclick="mgrOpenAddBookmark()" style="margin-left:auto"><i class="bi bi-plus-lg"></i> 新建书签</button>
                </div>
                <div class="mgmt-table-scroll" id="mgrTableBody">
                    <div style="text-align:center;padding:40px;color:#999">加载中...</div>
                </div>
                <div class="mgmt-pagination-area" id="mgrPaginationArea">
                    <div id="mgrPaginationHtml"></div>
                    <select id="mgrPageSize" onchange="mgrChangePageSize(this.value)">
                        <option value="10">10条/页</option>
                        <option value="20">20条/页</option>
                        <option value="50">50条/页</option>
                        <option value="100">100条/页</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
