<!-- 文件夹删除确认弹窗 -->
<div id="_delFolderModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1060;">
    <div class="bm-form-content" style="max-width:460px;">
        <div class="bm-header">
            <h5>确认删除</h5>
            <button type="button" class="bm-header-close" onclick="document.getElementById('_delFolderModal').remove()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="bm-form-body">
            <p>确定要删除该文件夹吗？</p>
            <p style="font-size:13px;color:#e74c3c" id="_delFolderWarn" class="d-none"></p>
            <p id="_delFolderErr" class="d-none" style="font-size:13px;color:#e74c3c"></p>
        </div>
        <div class="bm-footer">
            <button class="bm-btn bm-btn-secondary" onclick="document.getElementById('_delFolderModal').remove()">取消</button>
            <button class="bm-btn bm-btn-primary" id="_delFolderBtn" onclick="mgrConfirmDelFolder(currentDelFolderId)"><i class="bi bi-check"></i> 删除</button>
        </div>
    </div>
</div>
