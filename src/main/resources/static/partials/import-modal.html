<!-- 导入书签弹窗 -->
<div id="_importModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1060;">
    <div class="bm-form-content" style="max-width:500px;">
        <div class="bm-header">
            <h5><i class="bi bi-upload me-2"></i>导入书签</h5>
            <button type="button" class="bm-header-close" onclick="document.getElementById('_importModal').remove()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="bm-form-body">
            <div class="bm-field">
                <label>选择书签文件</label>
                <input type="file" id="_importFile" accept=".html,.htm" class="bm-input">
            </div>
            <label class="bm-toggle-label" style="margin-bottom:8px">
                <input type="checkbox" id="_importStructure" checked> <span>按目录结构导入</span>
            </label><br>
            <label class="bm-toggle-label" style="margin-bottom:8px">
                <input type="checkbox" id="_importPrivate"> <span>私密导入</span>
            </label>
            <div id="_importStatus" style="font-size:13px;color:var(--text-secondary);margin-top:8px"></div>
        </div>
        <div class="bm-footer">
            <button class="bm-btn bm-btn-secondary" onclick="document.getElementById('_importModal').remove()">取消</button>
            <button class="bm-btn bm-btn-primary" onclick="mgrDoImport()"><i class="bi bi-check"></i> 开始导入</button>
        </div>
    </div>
</div>
