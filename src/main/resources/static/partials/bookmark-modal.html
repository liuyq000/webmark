<!-- 书签新建/编辑弹窗 -->
<div id="_bookmarkModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1050;">
    <div class="bm-form-content">
        <div class="bm-header">
            <h5 id="_bmModalTitle"></h5>
            <button type="button" class="bm-header-close" onclick="closeBookmarkModal()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="bm-form-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div class="bm-field">
                    <label>URL <span class="bm-required">*</span></label>
                    <input id="_bmUrl" class="bm-input" placeholder="https://example.com">
                </div>
                <div class="bm-field">
                    <label>标题</label>
                    <input id="_bmTitle" class="bm-input" placeholder="书签名称">
                </div>
                <div class="bm-field">
                    <label>所属文件夹</label>
                    <div class="tree-select">
                        <div class="tree-select-input" onclick="toggleBookmarkTreePanel()">
                            <span id="_bmFolderLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">请选择文件夹</span>
                            <i class="bi bi-chevron-down" style="font-size:12px;color:#aaa"></i>
                        </div>
                        <input type="hidden" id="_bmFolderId" value="">
                        <div class="tree-select-dropdown" id="_bmTreeSelectDropdown"></div>
                    </div>
                </div>
                <div class="bm-field">
                    <label>Logo URL</label>
                    <input id="_bmLogo" class="bm-input" placeholder="可选，图标地址">
                </div>
            </div>
            <div class="bm-field">
                <label>描述</label>
                <textarea id="_bmDesc" class="bm-input bm-textarea" rows="2" placeholder="书签描述（可选）"></textarea>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div class="bm-field">
                    <label>标签</label>
                    <input id="_bmTags" class="bm-input" placeholder="多个标签用逗号分隔">
                </div>
                <div class="bm-field">
                    <label>类型</label>
                    <div class="bm-toggle-group">
                        <label class="bm-toggle-label"><input type="radio" name="bmPublic" value="1" checked> <span>公开</span></label>
                        <label class="bm-toggle-label"><input type="radio" name="bmPublic" value="0"> <span>私密</span></label>
                    </div>
                </div>
            </div>
        </div>
        <div class="bm-footer">
            <button class="bm-btn bm-btn-secondary" onclick="closeBookmarkModal()">取消</button>
            <button class="bm-btn bm-btn-primary" id="_bmSubmitBtn" onclick="submitBookmarkModal()"><i class="bi bi-check"></i> 保存</button>
        </div>
    </div>
</div>
