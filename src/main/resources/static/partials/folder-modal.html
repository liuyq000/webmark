<!-- 文件夹新建/编辑弹窗 -->
<div id="_folderModal" style="display:block;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1060;">
    <div class="bm-form-content">
        <div class="bm-header">
            <h5 id="_folderModalTitle"></h5>
            <button type="button" class="bm-header-close" onclick="document.getElementById('_folderModal').remove()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="bm-form-body">
            <div class="bm-field">
                <label>父级文件夹</label>
                <div class="tree-select">
                    <div class="tree-select-input" onclick="toggleFolderParentPanel()">
                        <span id="_folderParentLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">无（顶级文件夹）</span>
                        <i class="bi bi-chevron-down" style="font-size:12px;color:#aaa"></i>
                    </div>
                    <input type="hidden" id="_folderParentId" value="">
                    <div class="tree-select-dropdown" id="_folderParentDropdown"></div>
                </div>
            </div>
            <div class="bm-field">
                <label>名称 <span class="bm-required">*</span></label>
                <input id="_folderName" class="bm-input" placeholder="请输入文件夹名称">
            </div>
            <div class="bm-field">
                <label>英文名</label>
                <input id="_folderNameEn" class="bm-input" placeholder="可选">
            </div>
            <div class="bm-field">
                <label>图标</label>
                <input id="_folderIcon" class="bm-input" placeholder="如: bi-folder, bi-code-slash">
            </div>
            <input type="hidden" id="_folderId" value="">
        </div>
        <div class="bm-footer">
            <button class="bm-btn bm-btn-secondary" onclick="document.getElementById('_folderModal').remove()">取消</button>
            <button class="bm-btn bm-btn-primary" onclick="mgrSaveFolder()"><i class="bi bi-check"></i> 保存</button>
        </div>
    </div>
</div>
