<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地书签 - 发现优质资源</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%234f6ef7' d='M2 2v13l6-3 6 3V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z'/%3E%3C/svg%3E">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/drag-editor.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <!-- ========== 顶栏 ========== -->
    <header class="top-header">
        <div class="header-inner">
            <div class="header-left">
                <a href="/index.html" class="header-logo">
                    <i class="bi bi-bookmark-star-fill"></i>
                    <span>本地书签</span>
                </a>
            </div>
            <div class="header-right">
                <a class="header-btn" href="javascript:;" id="searchToggle" title="搜索书签">
                    <i class="bi bi-search"></i> 搜索
                </a>
                <div class="header-actions" id="headerActions"></div>
            </div>
        </div>
    </header>

    <!-- ========== 主体 ========== -->
    <div class="layout-wrapper">
        <aside class="sidebar-folder" id="sidebarFolder" onmouseleave="hideFolderFloat()">
            <div class="sidebar-folder-list" id="sidebarFolderList"></div>
        </aside>

        <main class="main-content">
            <div class="content-wrapper" id="mainContent">
                <div id="bmBrowsePanel">
                    <div class="search-shortcut-area">
                        <div class="home-search-row">
                            <div class="home-search-engine" id="searchEngineDropdown">
                                <button class="dropdown-trigger" type="button" onclick="toggleEngineMenu()">
                                    <span class="dropdown-label">百度</span>
                                    <i class="bi bi-chevron-down"></i>
                                </button>
                                <ul class="dropdown-menu" id="engineMenu">
                                    <li data-value="baidu" class="active" onclick="selectEngine(this)">百度</li>
                                    <li data-value="quark" onclick="selectEngine(this)">夸克</li>
                                    <li data-value="google" onclick="selectEngine(this)">谷歌</li>
                                </ul>
                            </div>
                            <select id="searchEngineSelect" hidden>
                                <option value="baidu">百度</option>
                                <option value="quark">夸克</option>
                                <option value="google">谷歌</option>
                            </select>
                            <div class="home-search-box">
                                <input type="text" id="homeSearchInput" placeholder="输入关键词搜索..." autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')doHomeSearch()">
                                <button type="button" onclick="doHomeSearch()">搜 索</button>
                            </div>
                        </div>
                        <div class="home-shortcut-links" id="homeShortcutLinks"></div>
                    </div>
                </div>

                <div class="folder-float-panel" id="folderFloatPanel" onmouseenter="cancelHideFolderFloat()" onmouseleave="hideFolderFloat()"></div>
                <div id="bmMgmtPanel" style="display:none"></div>
                <div id="bmUserPanel" style="display:none"></div>
                <div id="bmUserModals"></div>
                <div id="collectToolPanel" style="display:none"></div>
            </div>
        </main>
    </div>

    <div id="bookmarkModals"></div>
    <div id="folderModals"></div>
    <div id="toolModals"></div>

    <!-- ========== 搜索浮层（全屏覆盖） ========== -->
    <div id="searchOverlay" class="search-overlay">
        <div class="search-overlay-mask"></div>
        <div class="search-overlay-content">
            <div class="search-overlay-bar">
                <i class="bi bi-search search-overlay-icon"></i>
                <input type="text" id="searchOverlayInput" placeholder="搜索书签、描述、标签..." autocomplete="off">
                <button class="search-overlay-close" id="searchOverlayClose"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="search-overlay-body" id="searchOverlayBody">
                <div class="search-overlay-empty"><i class="bi bi-search"></i><p>输入关键词开始搜索</p></div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/drag-editor.js"></script>
</body>
</html>
