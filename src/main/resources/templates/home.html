<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的空间 - 本地书签</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- 顶部Header -->
    <header class="top-header">
        <div class="header-inner">
            <a class="logo" th:href="@{/index}">
                <i class="bi bi-bookmark-star-fill"></i>
                <span>本地书签</span>
            </a>
            <button class="header-btn sidebar-toggle-desktop" id="sidebarToggleDesktop" title="切换侧边栏"><i class="bi bi-layout-sidebar-inset"></i></button>
            <div class="header-actions">
                <a class="header-btn" href="javascript:;" onclick="openBookmarkModal()" title="新建书签"><i class="bi bi-plus-circle"></i> 新建书签</a>
                <a class="header-btn" th:href="@{/index}" title="返回首页"><i class="bi bi-house"></i> 首页</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <button class="header-btn" type="submit" title="退出登录"><i class="bi bi-box-arrow-right"></i> 退出</button>
                </form>
            </div>
            <!-- 移动端菜单按钮 -->
            <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        </div>
    </header>

    <div class="layout-wrapper">
        <!-- 左侧侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                <!-- 用户信息 -->
                <div class="sidebar-user-info">
                    <i class="bi bi-person-circle"></i>
                    <span class="channel-text" th:text="${user.userName}">用户名</span>
                </div>
                <!-- 动态文件夹栏目 -->
                <div th:each="folder : ${folderTree}" class="sidebar-channel open"
                     th:attr="data-folder-id=${folder.id}, data-tooltip=${folder.name} + ' ' + ${folder.nameEn}"
                     th:classappend="${folder.id == folderId} ? 'active' : ''">
                    <div class="channel-title" data-toggle="channel" th:attr="data-folder-id=${folder.id}">
                        <i class="bi channel-icon" th:classappend="${folder.icon != null ? folder.icon : 'bi-folder'}"></i>
                        <span class="channel-text" th:text="${folder.name}">栏目名</span>
                        <small class="channel-text" th:text="${folder.nameEn}">English</small>
                        <i class="bi bi-chevron-down channel-arrow"></i>
                    </div>
                    <ul class="channel-list">
                        <li th:each="child : ${folder.children}">
                            <a href="javascript:;" th:attr="data-folder-id=${folder.id}, data-section-name=${child.name}"
                               th:text="${child.name}" class="sub-nav-link">子栏目</a>
                            <ul th:if="${child.children != null and !child.children.isEmpty()}" class="channel-list sub-channel-list">
                                <li th:each="grandchild : ${child.children}">
                                    <a href="javascript:;" th:attr="data-folder-id=${folder.id}, data-section-name=${grandchild.name}"
                                       th:text="${grandchild.name}" class="sub-nav-link">三级栏目</a>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="main-content">
            <div class="content-wrapper">
            <!-- 每个顶级文件夹一个内容面板 -->
            <div th:each="entry : ${allGrouped}" class="folder-panel"
                 th:attr="data-folder-id=${entry.key}"
                 th:styleappend="${entry.key != folderId} ? 'display:none'">
                <!-- 当前栏目标题 -->
                <div class="current-folder-header">
                    <h2 class="current-folder-title">
                        <i class="bi" th:classappend="${folderTree[__${entryStat.index}__].icon != null ? folderTree[__${entryStat.index}__].icon : 'bi-folder'}"></i>
                        <span th:text="${folderTree[__${entryStat.index}__].name}">栏目名</span>
                    </h2>
                </div>

                <!-- 书签卡片分组 -->
                <div th:each="sub : ${entry.value}" class="category-section" th:attr="data-section-name=${sub.key}">
                    <div class="section-header">
                        <h3 class="section-title" th:text="${sub.key}">分类名称</h3>
                    </div>
                    <div class="resource-grid">
                        <a th:each="bookmark : ${sub.value}" th:href="${bookmark.url}" target="_blank" rel="noopener" class="resource-card" th:attr="data-bookmark-id=${bookmark.id}">
                            <div class="card-icon">
                                <img th:if="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()}"
                                     th:src="${bookmark.logoUrl}" th:alt="${bookmark.title}"
                                     onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">
                                <div class="card-icon-fallback" th:styleappend="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()} ? 'display:none'"
                                     th:text="${#strings.substring(bookmark.title, 0, 1)}">W</div>
                            </div>
                            <div class="card-info">
                                <div class="card-name" th:text="${bookmark.title}">资源名称</div>
                                <div class="card-desc" th:text="${bookmark.description}">资源描述</div>
                            </div>

                        </a>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div th:if="${allGrouped == null or allGrouped.isEmpty()}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <p>暂无书签数据</p>
                <a class="empty-action" th:href="@{/index}">去首页发现优质资源</a>
            </div>

            <!-- 页脚 -->
            <footer class="site-footer">
                <p>Copyright &copy; 2024 本地书签 | ICP备XXXXXXXX号</p>
            </footer>
            </div>
        </main>
    </div>

    <!-- 移动端遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay">    </div>

    <!-- 新建书签模态框 -->
    <div class="modal fade" id="bookmarkModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="bookmarkModalTitle">新建书签</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="bookmarkModalForm" onsubmit="return false">
                        <input type="hidden" id="modalBookmarkId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="modalBookmarkTitle" class="form-label">标题 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="modalBookmarkTitle" required placeholder="请输入书签标题">
                            </div>
                            <div class="col-md-6">
                                <label for="modalBookmarkUrl" class="form-label">URL <span class="text-danger">*</span></label>
                                <input type="url" class="form-control" id="modalBookmarkUrl" required placeholder="https://example.com">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">所属文件夹</label>
                                <div class="tree-select">
                                    <div class="tree-select-input form-control d-flex align-items-center justify-content-between" onclick="toggleBookmarkTreePanel()">
                                        <span id="modalBookmarkFolderLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">请选择文件夹</span>
                                        <i class="bi bi-chevron-down" style="font-size:12px;color:#aaa"></i>
                                    </div>
                                    <input type="hidden" id="modalBookmarkFolderId" value="">
                                    <div class="tree-select-dropdown" id="bookmarkTreeSelectDropdown"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="modalBookmarkLogoUrl" class="form-label">Logo URL</label>
                                <input type="text" class="form-control" id="modalBookmarkLogoUrl" placeholder="网站图标地址（可选）">
                            </div>
                            <div class="col-12">
                                <label for="modalBookmarkDescription" class="form-label">描述</label>
                                <textarea class="form-control" id="modalBookmarkDescription" rows="2" placeholder="书签描述（可选）"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="modalBookmarkTags" class="form-label">标签</label>
                                <input type="text" class="form-control" id="modalBookmarkTags" placeholder="多个标签用逗号分隔">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">类型</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="modalBookmarkPublicType" id="modalPublicType1" value="1" checked>
                                        <label class="form-check-label" for="modalPublicType1">公开</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="modalBookmarkPublicType" id="modalPublicType0" value="0">
                                        <label class="form-check-label" for="modalPublicType0">私密</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="submitBookmarkFromModal()">保存</button>
                </div>
            </div>
        </div>
    </div>


    <script th:inline="javascript">
    /*<![CDATA[*/
    var folderTreeData = /*[[${folderTree}]]*/ [];
    /*]]>*/
    </script>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
