<!-- fragment: browse-panel -->
            <!-- ========== 浏览模式 ========== -->
            <div th:fragment="browsePanel" id="bmBrowsePanel" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
                <!-- 每个顶级文件夹一个内容面板 -->
                <div th:each="entry : ${allGrouped}" class="folder-panel"
                     th:attr="data-folder-id=${entry.key}"
                     th:styleappend="${entry.key != folderId} ? 'display:none'">
                    <!-- 当前栏目标题 -->
                    <div class="current-folder-header">
                        <h2 class="current-folder-title">
                            <i class="bi" th:classappend="${folderMap[entry.key] != null && folderMap[entry.key].icon != null ? folderMap[entry.key].icon : 'bi-folder'}"></i>
                            <span th:text="${folderMap[entry.key] != null ? folderMap[entry.key].name : '栏目'}">栏目名</span>
                        </h2>
                    </div>

                    <!-- 书签卡片分组 -->
                    <div th:each="sub : ${entry.value}" class="category-section" th:attr="data-section-name=${sub.key}">
                        <div class="section-header">
                            <h3 class="section-title" th:text="${sub.key}">分类名称</h3>
                        </div>
                        <div class="resource-grid">
                            <a th:each="bookmark : ${sub.value}" th:href="${bookmark.url}" target="_blank" rel="noopener" class="resource-card" th:attr="data-bookmark-id=${bookmark.id}">
                                <div class="card-icon">
                                    <img th:if="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()}"
                                         th:src="${bookmark.logoUrl}" th:alt="${bookmark.title}"
                                         onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">
                                    <div class="card-icon-fallback" th:styleappend="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()} ? 'display:none'"
                                         th:text="${#strings.substring(bookmark.title, 0, 1)}">W</div>
                                </div>
                                <div class="card-info">
                                    <div class="card-name" th:text="${bookmark.title}">资源名称</div>
                                    <div class="card-desc" th:text="${bookmark.description}">资源描述</div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 空状态 -->
                <div th:if="${allGrouped == null or allGrouped.isEmpty()}" class="empty-state">
                    <i class="bi bi-inbox"></i>
                    <p>暂无资源数据</p>
                </div>

                <!-- 页脚 -->
                <footer class="site-footer" style="display:none">
                    <p>Copyright &copy; 2024 本地书签 | ICP备XXXXXXXX号</p>
                    <div class="footer-links">
                        <a href="#">关于我们</a>
                        <a href="#">意见反馈</a>
                        <a href="#">友情链接</a>
                    </div>
                </footer>
                <!-- 内容为空时显示引导 -->
                <div th:if="${#maps.isEmpty(allGrouped)}" class="text-center py-5" style="color:#999">
                    <div id="bmBrowsePanelEmpty" class="py-5">
                        <i class="bi bi-bookmark-star" style="font-size:64px;display:block;margin-bottom:16px;color:#ddd"></i>
                        <h5 style="font-weight:600;color:#666">欢迎来到本地书签</h5>
                        <p class="mb-1" style="font-size:14px">收录你喜爱的网站，分类整理，随时查阅</p>
                        <p class="mt-3" style="font-size:13px">
                            <span sec:authorize="!isAuthenticated()">
                                <i class="bi bi-person-circle me-1"></i>
                                <a th:href="@{/login}" class="text-decoration-none">登录</a>
                                <span class="mx-2">|</span>
                                <a th:href="@{/register}" class="text-decoration-none">注册</a>
                            </span>
                            <span sec:authorize="isAuthenticated()">
                                <i class="bi bi-plus-circle me-1"></i>
                                <a href="javascript:;" onclick="openBookmarkModal()" class="text-decoration-none">新建书签</a>
                            </span>
                        </p>
                    </div>
                </div>
            </div>
