<!-- fragment: folder-modals -->
<div th:fragment="folderModals" xmlns:th="http://www.thymeleaf.org">
    <!-- 新增/编辑文件夹模态框 -->
    <div class="modal fade" id="folderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="folderModalTitle">新增文件夹</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="folderForm" onsubmit="return false">
                        <input type="hidden" id="folderId">
                        <div class="mb-3">
                            <label class="form-label">父级文件夹</label>
                            <div class="tree-select">
                                <div class="tree-select-input form-control d-flex align-items-center justify-content-between" onclick="toggleFolderTreePanel()">
                                    <span id="folderParentLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">无（顶级文件夹）</span>
                                    <i class="bi bi-chevron-down" style="font-size:12px;color:#aaa"></i>
                                </div>
                                <input type="hidden" id="folderParentId" value="">
                                <div class="tree-select-dropdown" id="folderTreeSelectDropdown"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="folderName" class="form-label">名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="folderName" required placeholder="请输入文件夹名称">
                        </div>
                        <div class="mb-3">
                            <label for="folderNameEn" class="form-label">英文名</label>
                            <input type="text" class="form-control" id="folderNameEn" placeholder="请输入英文名">
                        </div>
                        <div class="mb-3">
                            <label for="folderIcon" class="form-label">图标</label>
                            <input type="text" class="form-control" id="folderIcon" placeholder="如：bi-folder, bi-code-slash">
                            <div class="form-text">Bootstrap Icons 图标类名</div>
                        </div>
                        <div class="mb-3">
                            <label for="folderSortOrder" class="form-label">排序</label>
                            <input type="number" class="form-control" id="folderSortOrder" value="0" min="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveFolder()">保存</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 删除文件夹确认模态框 -->
    <div class="modal fade" id="deleteFolderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteFolderModalTitle">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="deleteFolderModalMessage">确定要删除该文件夹吗？</p>
                    <div id="deleteFolderModalWarning" class="alert alert-warning d-none mt-2 mb-0"></div>
                    <div id="deleteFolderModalError" class="alert alert-danger d-none mt-2 mb-0"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" id="deleteFolderModalBtn" onclick="confirmDeleteFolder()">删除</button>
                </div>
            </div>
        </div>
    </div>
</div>
