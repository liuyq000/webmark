<!-- fragment: user-panel -->
            <div th:fragment="userPanel" xmlns:th="http://www.thymeleaf.org">
                <div class="modal fade" id="userMgmtModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-dialog-scrollable">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title"><i class="bi bi-people-fill"></i> 用户管理</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <button class="btn btn-primary btn-sm" onclick="openUserModal()"><i class="bi bi-person-plus me-1"></i>新建用户</button>
                                </div>
                                <div class="card shadow-sm border-0">
                                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-2 px-3">
                                        <span class="small text-muted" id="userTotalText">共 0 个用户</span>
                                        <div class="input-group input-group-sm" style="max-width:220px">
                                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                                            <input type="text" class="form-control" id="userSearchInput" placeholder="搜索用户名/邮箱..." oninput="searchUsers()">
                                        </div>
                                    </div>
                                    <div class="card-body p-0">
                                        <div class="table-responsive">
                                            <table class="table table-hover mb-0">
                                                <thead class="table-light">
                                                    <tr>
                                                        <th style="width:50px">ID</th>
                                                        <th>用户名</th>
                                                        <th>邮箱</th>
                                                        <th style="width:80px">角色</th>
                                                        <th style="width:160px">创建时间</th>
                                                        <th style="width:130px">操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody id="userTableBody">
                                                    <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                    <div class="card-footer bg-white d-flex justify-content-between align-items-center py-2">
                                        <span class="small text-muted" id="userPageInfo">第 0-0 条，共 0 条</span>
                                        <nav><ul class="pagination pagination-sm mb-0" id="userPagination"></ul></nav>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
