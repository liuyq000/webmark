<!-- fragment: tool-modals -->
<div th:fragment="toolModals" xmlns:th="http://www.thymeleaf.org">
    <!-- 导入/导出模态框 -->
    <div class="modal fade" id="importModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">导入书签</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <form id="importForm" enctype="multipart/form-data">
                <div class="mb-2"><label class="form-label">选择书签文件</label><input type="file" class="form-control form-control-sm" id="importFile" accept=".html,.htm" required></div>
                <div class="form-check mb-1"><input class="form-check-input" type="checkbox" id="importStructure" value="YES" checked><label class="form-check-label">按目录结构导入</label></div>
                <div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="importPrivate" value="PRIVATE"><label class="form-check-label">私密导入</label></div>
            </form>
            <div id="importStatus" class="small"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button><button class="btn btn-sm btn-primary" onclick="doImport()">开始导入</button></div>
    </div></div></div>
    <div class="modal fade" id="exportModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content">
        <div class="modal-header border-0 pb-0"><h5 class="modal-title"><i class="bi bi-download me-2"></i>导出收藏夹</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body pt-2">
            <p class="text-muted small mb-3"><i class="bi bi-info-circle me-1"></i>将书签导出为浏览器兼容的 HTML 书签文件，可导入到 Chrome、Edge、Firefox 等浏览器。</p>
            <div class="row g-3">
                <div class="col-md-7">
                    <div class="card border shadow-sm">
                        <div class="card-header bg-light d-flex align-items-center justify-content-between py-2 px-3">
                            <span class="fw-semibold small"><i class="bi bi-folder2 me-1"></i>选择文件夹</span>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox" id="exportSelectAll" checked style="cursor:pointer">
                                <label class="form-check-label small" for="exportSelectAll">全选</label>
                            </div>
                        </div>
                        <div class="card-body p-1" style="max-height:420px;overflow-y:auto">
                            <div id="exportFolderTree"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="card border shadow-sm">
                        <div class="card-header bg-light py-2 px-3">
                            <span class="fw-semibold small"><i class="bi bi-sliders me-1"></i>导出选项</span>
                        </div>
                        <div class="card-body p-3">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold text-muted mb-1">导出格式</label>
                                <div class="d-flex flex-column gap-2" id="exportFormatRadios">
                                    <div class="form-check export-format-option border rounded p-2 mb-0" style="cursor:pointer">
                                        <input class="form-check-input" type="radio" name="exportFormat" id="fmtHtml" value="html" checked>
                                        <label class="form-check-label" for="fmtHtml">
                                            <span class="d-block fw-semibold small">HTML</span>
                                            <span class="d-block text-muted" style="font-size:11px">浏览器书签格式，可导入 Chrome/Edge/Firefox</span>
                                        </label>
                                    </div>
                                    <div class="form-check export-format-option border rounded p-2 mb-0" style="cursor:pointer">
                                        <input class="form-check-input" type="radio" name="exportFormat" id="fmtCsv" value="csv">
                                        <label class="form-check-label" for="fmtCsv">
                                            <span class="d-block fw-semibold small">CSV</span>
                                            <span class="d-block text-muted" style="font-size:11px">表格格式，可用 Excel / Numbers 打开</span>
                                        </label>
                                    </div>
                                    <div class="form-check export-format-option border rounded p-2 mb-0" style="cursor:pointer">
                                        <input class="form-check-input" type="radio" name="exportFormat" id="fmtJson" value="json">
                                        <label class="form-check-label" for="fmtJson">
                                            <span class="d-block fw-semibold small">JSON</span>
                                            <span class="d-block text-muted" style="font-size:11px">结构化数据，适合程序处理或备份还原</span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer border-0 pt-0"><button class="btn btn-sm btn-light" data-bs-dismiss="modal">取消</button><button class="btn btn-sm btn-primary" onclick="doExport()"><i class="bi bi-download me-1"></i>确认导出</button></div>
    </div></div></div>
    <div class="modal fade" id="iconModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title"><i class="bi bi-emoji-smile"></i> 图标管理</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
                <select class="form-select form-select-sm" id="iconCategorySelect" onchange="changeIconCategory(this.value)" style="width:auto;min-width:120px">
                    <option value="all">全部 (加载中...)</option>
                </select>
                <div class="input-group input-group-sm" style="max-width:220px">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="iconSearchInput" class="form-control" placeholder="搜索图标..." oninput="filterIcons()">
                </div>
            </div>
            <p class="text-muted small mb-3">共 <span id="iconTotalCount">0</span> 个图标，点击即可复制 <code>bi bi-xxx</code> 类名</p>
            <div class="icon-grid" id="iconGrid"></div>
            <div id="iconNoResult" class="text-center py-4 d-none">
                <i class="bi bi-emoji-frown fs-1 text-muted"></i>
                <p class="text-muted mt-2">未找到匹配的图标</p>
            </div>
        </div>
    </div></div></div>
</div>
