<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 本地书签</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%234f6ef7' d='M2 2v13l6-3 6 3V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z'/%3E%3C/svg%3E">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <header class="top-header">
        <div class="header-inner">
            <a class="logo" th:href="@{/index}">
                <i class="bi bi-bookmark-star-fill"></i>
                <span>本地书签</span>
            </a>
            <div class="header-actions">
                <div sec:authorize="hasRole('ADMIN')">
                    <a class="header-btn admin-btn" th:href="@{/admin/index}"><i class="bi bi-gear-fill"></i> 管理后台</a>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a class="header-btn admin-btn" th:href="@{/login?redirect=/admin/index}"><i class="bi bi-gear-fill"></i> 进入后台</a>
                </div>
            </div>
        </div>
    </header>

    <div class="layout-wrapper">
        <main class="main-content" style="margin-left:0">
            <div class="content-wrapper">
            <div class="search-box-wrapper">
                <form th:action="@{/search}" method="get">
                    <div class="search-box">
                        <i class="bi bi-search"></i>
                        <input type="text" name="key" placeholder="搜索资源名称、描述、标签..." th:value="${key}" autofocus>
                        <button type="submit">搜索</button>
                    </div>
                </form>
            </div>

            <div th:if="${key != null and !key.isEmpty()}">
                <p class="search-count">搜索 "<span th:text="${key}"></span>" 共找到 <strong th:text="${results != null ? results.size() : 0}">0</strong> 个结果</p>

                <div th:if="${results != null and !results.isEmpty()}" class="category-section">
                    <div class="resource-grid">
                        <a th:each="bookmark : ${results}" th:href="${bookmark.url}" target="_blank" rel="noopener" class="resource-card">
                            <div class="card-icon">
                                <img th:if="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()}"
                                     th:src="${bookmark.logoUrl}" th:alt="${bookmark.title}"
                                     onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='flex';">
                                <div class="card-icon-fallback" th:styleappend="${bookmark.logoUrl != null and !bookmark.logoUrl.isEmpty()} ? 'display:none'"
                                     th:text="${#strings.substring(bookmark.title, 0, 1)}">W</div>
                            </div>
                            <div class="card-info">
                                <div class="card-name" th:text="${bookmark.title}"></div>
                                <div class="card-desc" th:text="${bookmark.description}"></div>
                            </div>

                        </a>
                    </div>
                </div>

                <div th:if="${results == null or results.isEmpty()}" class="empty-state">
                    <i class="bi bi-search"></i>
                    <p>未找到匹配的资源</p>
                </div>
            </div>
            </div>
        </main>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <script>
    (function() {
        var keyword = /*[[${key}]]*/ '';
        if (!keyword) return;
        document.querySelectorAll('.resource-grid .card-name, .resource-grid .card-desc').forEach(function(el) {
            var text = el.textContent;
            var escapedKw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            var regex = new RegExp('(' + escapedKw + ')', 'gi');
            el.innerHTML = text.replace(regex, '<mark class="search-highlight">$1</mark>');
        });
    })();
    </script>
</body>
</html>
