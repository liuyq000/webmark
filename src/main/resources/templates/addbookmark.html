<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加书签 - 本地书签</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath fill='%234f6ef7' d='M2 2v13l6-3 6 3V2a1 1 0 0 0-1-1H3a1 1 0 0 0-1 1z'/%3E%3C/svg%3E">
    <style>
        body { background: #f5f6fa; font-size: 14px; }
        .container { max-width: 620px; margin-top: 40px; }
        .card { border-radius: 12px; border: none; }
        .card-header { border-radius: 12px 12px 0 0 !important; background: #fff; border-bottom: 1px solid #eee; }
        .form-label { font-weight: 500; font-size: 13px; color: #555; margin-bottom: 4px; }
        .form-control, .form-control:focus { font-size: 14px; box-shadow: none; border-color: #ddd; }
        .form-control:focus { border-color: #4f6ef7; }
        .btn-primary { background: #4f6ef7; border-color: #4f6ef7; }
        .btn-primary:hover { background: #3d5bd9; border-color: #3d5bd9; }
        /* 文件夹树选择器 */
        .tree-select { position: relative; }
        .tree-select-input { cursor: pointer; user-select: none; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; min-height: 36px; }
        .tree-select-input:hover { border-color: #4f6ef7; }
        .tree-select-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 1000; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); max-height: 280px; overflow-y: auto; margin-top: 4px; }
        .tree-select-dropdown.open { display: block; }
        .tree-select-item { display: flex; align-items: center; padding: 7px 12px; cursor: pointer; transition: background 0.12s; border-radius: 4px; margin: 1px 4px; }
        .tree-select-item:hover { background: #f0f4ff; }
        .tree-select-item.select-selected { background: #e8edff; font-weight: 600; }
        .ts-toggle { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; color: #999; font-size: 11px; margin-right: 4px; cursor: pointer; flex-shrink: 0; }
        .ts-toggle:hover { color: #4f6ef7; }
        .ts-empty { display: inline-block; width: 20px; margin-right: 4px; flex-shrink: 0; }
        .ts-icon { margin-right: 6px; color: #faad14; font-size: 13px; flex-shrink: 0; }
        .ts-name { font-size: 13px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-select-children { }
        .success-card { text-align: center; padding: 40px 20px; }
        .success-card i { font-size: 56px; color: #52c41a; margin-bottom: 16px; }
        .success-card h4 { font-weight: 600; margin-bottom: 8px; }
        .success-card p { color: #888; margin-bottom: 24px; }
    </style>
</head>
<body>
<div class="container">
    <!-- 未登录提示 -->
    <div th:unless="${user}">
        <div class="card shadow-sm text-center p-5">
            <i class="bi bi-exclamation-triangle text-warning" style="font-size:48px;margin-bottom:16px"></i>
            <h5>请先登录</h5>
            <p class="text-muted">你需要登录后才能添加书签</p>
            <a th:href="@{/login}" class="btn btn-primary mt-2"><i class="bi bi-box-arrow-in-right me-1"></i>去登录</a>
        </div>
    </div>

    <!-- 添加表单 -->
    <div th:if="${user}">
        <div class="card shadow-sm">
            <div class="card-header py-3 px-4 d-flex align-items-center justify-content-between">
                <h5 class="mb-0" style="font-size:16px"><i class="bi bi-bookmark-plus me-2 text-primary"></i>添加书签</h5>
                <small class="text-muted"><i class="bi bi-info-circle me-1"></i>bookmarklet 收集</small>
            </div>
            <div class="card-body p-4">
                <!-- 提交前: 表单 -->
                <div id="addBookmarkForm">
                    <form onsubmit="return false">
                        <div class="mb-3">
                            <label class="form-label">URL <span class="text-danger">*</span></label>
                            <input type="url" class="form-control" id="bmUrl" th:value="${bmUrl}" readonly
                                   style="background:#f8f9fa;cursor:default;color:#555;word-break:break-all">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="bmTitle" th:value="${bmTitle}" maxlength="200" placeholder="输入书签标题">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea class="form-control" id="bmDescription" rows="2" th:text="${bmDescription}" placeholder="书签描述（可选）"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">所属文件夹</label>
                            <div class="tree-select">
                                <div class="tree-select-input d-flex align-items-center justify-content-between"
                                     onclick="toggleAddBmTreePanel()">
                                    <span id="addBmFolderLabel" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#999">请选择文件夹</span>
                                    <i class="bi bi-chevron-down" style="font-size:12px;color:#aaa;flex-shrink:0"></i>
                                </div>
                                <input type="hidden" id="addBmFolderId">
                                <div class="tree-select-dropdown" id="addBmTreeSelectDropdown"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">标签</label>
                            <input type="text" class="form-control" id="bmTags" placeholder="多个标签用逗号分隔（可选）">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">类型</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="bmPublicType" id="bmPublicType1" value="1" checked>
                                    <label class="form-check-label" for="bmPublicType1">公开</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="bmPublicType" id="bmPublicType0" value="0">
                                    <label class="form-check-label" for="bmPublicType0">私密</label>
                                </div>
                            </div>
                        </div>
                        <div id="addBmError" class="small text-danger mb-2" style="display:none"></div>
                        <button type="button" class="btn btn-primary w-100" onclick="submitAddBookmark()">
                            <i class="bi bi-check-lg me-1"></i>保存书签
                        </button>
                    </form>
                </div>
                <!-- 提交后: 成功 -->
                <div id="addBookmarkSuccess" style="display:none">
                    <div class="success-card">
                        <i class="bi bi-check-circle-fill"></i>
                        <h4>添加成功</h4>
                        <p id="successMsg">书签已保存到「<span id="successFolderName"></span>」</p>
                        <button class="btn btn-primary" onclick="window.close()"><i class="bi bi-x-lg me-1"></i>关闭窗口</button>
                        <div class="mt-3">
                            <small class="text-muted">如果窗口未关闭，可以手动关闭</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
/*<![CDATA[*/
var folderTreeData = /*[[${folderTree}]]*/ [];
/*]]>*/

// ========== 文件夹树选择器 ==========
function buildAddBmTreeSelector() {
    var dropdown = document.getElementById('addBmTreeSelectDropdown');
    var hidden = document.getElementById('addBmFolderId');
    var label = document.getElementById('addBmFolderLabel');
    if (!dropdown || !hidden) return;
    function setLabel(v, t) { hidden.value = v; label.textContent = t; label.style.color = '#333'; }
    setLabel('', '请选择文件夹');
    dropdown.innerHTML = '';
    if (typeof folderTreeData === 'undefined') return;
    function renderTree(folders, level, parentEl) {
        var container = parentEl || dropdown;
        folders.forEach(function(f) {
            var hasChildren = f.children && f.children.length > 0;
            var div = document.createElement('div');
            div.className = 'tree-select-item';
            div.style.paddingLeft = (12 + level * 20) + 'px';
            var ts = document.createElement('span');
            if (hasChildren) {
                ts.className = 'ts-toggle';
                ts.innerHTML = '<i class="bi bi-chevron-down"></i>';
                ts.onclick = function(e) {
                    e.stopPropagation();
                    var cd = div.nextElementSibling;
                    if (cd && cd.classList.contains('tree-select-children')) {
                        var h = cd.style.display === 'none';
                        cd.style.display = h ? '' : 'none';
                        ts.querySelector('i').className = h ? 'bi bi-chevron-down' : 'bi bi-chevron-right';
                    }
                };
            } else {
                ts.className = 'ts-empty';
            }
            div.appendChild(ts);
            var icon = document.createElement('span');
            icon.className = 'ts-icon bi bi-folder-fill';
            div.appendChild(icon);
            var ns = document.createElement('span');
            ns.className = 'ts-name';
            ns.textContent = f.name;
            div.appendChild(ns);
            div.onclick = function() {
                setLabel(f.id, f.name);
                dropdown.querySelectorAll('.select-selected').forEach(function(el) { el.classList.remove('select-selected'); });
                div.classList.add('select-selected');
                closeAddBmTreePanel();
            };
            container.appendChild(div);
            if (hasChildren) {
                var cd = document.createElement('div');
                cd.className = 'tree-select-children';
                cd.style.display = 'none';
                container.appendChild(cd);
                renderTree(f.children, level + 1, cd);
            }
        });
    }
    renderTree(folderTreeData, 0);
}
function toggleAddBmTreePanel() {
    var dd = document.getElementById('addBmTreeSelectDropdown');
    if (dd) dd.classList.toggle('open');
}
function closeAddBmTreePanel() {
    var dd = document.getElementById('addBmTreeSelectDropdown');
    if (dd) dd.classList.remove('open');
}
document.addEventListener('click', function(e) {
    if (!e.target.closest('.tree-select')) {
        closeAddBmTreePanel();
    }
});

// ========== 提交 ==========
function submitAddBookmark() {
    var title = document.getElementById('bmTitle').value.trim();
    var url = document.getElementById('bmUrl').value.trim();
    var description = document.getElementById('bmDescription').value.trim();
    var folderId = document.getElementById('addBmFolderId').value;
    var tags = document.getElementById('bmTags').value.trim();
    var publicType = parseInt(document.querySelector('input[name="bmPublicType"]:checked').value);

    var errorEl = document.getElementById('addBmError');
    if (!title) { errorEl.textContent = '请输入标题'; errorEl.style.display = ''; return; }
    if (!url) { errorEl.textContent = 'URL 不能为空'; errorEl.style.display = ''; return; }
    errorEl.style.display = 'none';

    var btn = document.querySelector('.btn-primary');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span>保存中...';

    var body = {
        title: title,
        url: url,
        description: description,
        folderId: folderId ? parseInt(folderId) : null,
        tags: tags,
        publicType: publicType
    };

    fetch('/api/admin/bookmarks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    }).then(function(r) { return r.json(); }).then(function(d) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>保存书签';
        if (d.success) {
            document.getElementById('addBookmarkForm').style.display = 'none';
            var folderLabel = document.getElementById('addBmFolderLabel');
            document.getElementById('successFolderName').textContent = folderLabel.textContent || '未分类';
            document.getElementById('addBookmarkSuccess').style.display = 'block';
            // 3秒后自动关闭
            setTimeout(function() {
                try { window.close(); } catch(e) {}
            }, 3000);
        } else {
            errorEl.textContent = d.message || '保存失败';
            errorEl.style.display = '';
        }
    }).catch(function(e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>保存书签';
        errorEl.textContent = '网络错误，请重试';
        errorEl.style.display = '';
    });
}

// 初始化
buildAddBmTreeSelector();
</script>
</body>
</html>
