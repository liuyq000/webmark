<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页收集工具 - 本地书签后台</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{admin/fragments :: header}"></nav>

    <div class="d-flex" style="margin-top:56px">
        <nav th:replace="~{admin/fragments :: sidebar('collect')}"></nav>

        <main class="content flex-grow-1 p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/index}">首页</a></li>
                    <li class="breadcrumb-item active">网页收集工具</li>
                </ol>
            </nav>

            <h5 class="mb-3"><i class="bi bi-globe"></i> 网页收集工具</h5>

            <div style="max-width:650px">

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h6 class="card-title"><i class="bi bi-puzzle"></i> 1、使用浏览器扩展收藏网页</h6>
                    <p class="text-muted mb-2">支持：Chrome / 360极速 / QQ / UC / 百度浏览器</p>
                    <a target="_blank" href="https://chrome.google.com/webstore/detail/%E4%BA%91%E6%94%B6%E8%97%8F/gnidnmkcdgfiemdaeijncglpgldflhbb?hl=zh-CN" class="btn btn-primary btn-sm">
                        <i class="bi bi-download"></i> 下载扩展
                    </a>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body">
                    <h6 class="card-title"><i class="bi bi-bookmark-plus"></i> 2、网页收集小工具</h6>
                    <p class="text-muted mb-2">将该按钮拖动至浏览器书签栏，在任意网页点击即可收藏</p>
                    <a th:attr="href=${path}" onclick="alert('请把这个按钮拖到您的浏览器书签栏'); return false;" class="btn btn-success btn-sm">
                        <i class="bi bi-bookmark-star"></i> 本地书签
                    </a>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-title mb-3">使用演示</h6>
                    <img th:src="@{/images/useTool.gif}" alt="使用演示" class="img-fluid rounded" style="max-width:600px"/>
                </div>
            </div>

            </div>
        </main>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
