<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出收藏夹 - 本地书签后台</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
    <style>
        .tree-node { user-select: none; cursor: pointer; }
        .tree-node:hover { background: rgba(0,0,0,.03); border-radius: 4px; }
        .tree-toggle { display: inline-block; width: 18px; text-align: center;
            transition: transform .2s; margin-right: 2px; }
        .tree-toggle.collapsed { transform: rotate(-90deg); }
        .tree-children { overflow: hidden; }
        .tree-children.collapsed { max-height: 0 !important; }
        .tree-node input, .tree-node label { cursor: pointer; }
    </style>
</head>
<body>
    <nav th:replace="~{admin/fragments :: header}"></nav>
    <div class="d-flex" style="margin-top:56px">
        <nav th:replace="~{admin/fragments :: sidebar('export')}"></nav>
        <main class="content flex-grow-1 p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/index}">首页</a></li>
                    <li class="breadcrumb-item active">导出收藏夹</li>
                </ol>
            </nav>

            <h5 class="mb-3"><i class="bi bi-download"></i> 导出收藏夹</h5>

            <div class="card border-0 shadow-sm mb-3" style="max-width:650px">
                <div class="card-body">
                    <p class="text-muted mb-3">将书签导出为浏览器兼容的 HTML 书签文件，可导入到 Chrome、Edge、Firefox 等浏览器。</p>

                    <form id="exportForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">选择文件夹</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="selectAll" checked>
                                <label class="form-check-label" for="selectAll"><strong>全选</strong></label>
                            </div>
                            <hr class="my-2">
                            <div id="folderCheckboxes">
                                <th:block th:each="folder : ${folderTree}">
                                    <!-- 一级 -->
                                    <div class="tree-node" onclick="toggleTreeNode(this)" th:if="${folder.children != null and !folder.children.isEmpty()}"
                                         th:unless="${folder.children == null or folder.children.isEmpty()}">
                                        <span class="tree-toggle"><i class="bi bi-chevron-down"></i></span>
                                        <input class="form-check-input folder-check" type="checkbox" name="folderId"
                                               th:value="${folder.id}" checked onclick="event.stopPropagation()">
                                        <label class="form-check-label" th:text="${folder.name}">文件夹</label>
                                    </div>
                                    <div class="tree-node" th:if="${folder.children == null or folder.children.isEmpty()}">
                                        <span style="display:inline-block;width:18px"></span>
                                        <input class="form-check-input folder-check" type="checkbox" name="folderId"
                                               th:value="${folder.id}" checked>
                                        <label class="form-check-label" th:text="${folder.name}">文件夹</label>
                                    </div>
                                    <!-- 子级容器 -->
                                    <div class="tree-children" th:if="${folder.children != null and !folder.children.isEmpty()}" style="margin-left:18px">
                                        <th:block th:each="child : ${folder.children}">
                                            <div class="tree-node" onclick="toggleTreeNode(this)" th:if="${child.children != null and !child.children.isEmpty()}"
                                                 th:unless="${child.children == null or child.children.isEmpty()}">
                                                <span class="tree-toggle"><i class="bi bi-chevron-down"></i></span>
                                                <input class="form-check-input folder-check" type="checkbox" name="folderId"
                                                       th:value="${child.id}" checked onclick="event.stopPropagation()">
                                                <label class="form-check-label" th:text="${child.name}">子文件夹</label>
                                            </div>
                                            <div class="tree-node" th:if="${child.children == null or child.children.isEmpty()}">
                                                <span style="display:inline-block;width:18px"></span>
                                                <input class="form-check-input folder-check" type="checkbox" name="folderId"
                                                       th:value="${child.id}" checked>
                                                <label class="form-check-label" th:text="${child.name}">子文件夹</label>
                                            </div>
                                            <!-- 三级 -->
                                            <div class="tree-children" th:if="${child.children != null and !child.children.isEmpty()}" style="margin-left:18px">
                                                <div class="tree-node" th:each="gc : ${child.children}">
                                                    <span style="display:inline-block;width:18px"></span>
                                                    <input class="form-check-input folder-check" type="checkbox" name="folderId"
                                                           th:value="${gc.id}" checked>
                                                    <label class="form-check-label" th:text="${gc.name}" style="cursor:default">三级</label>
                                                </div>
                                            </div>
                                        </th:block>
                                    </div>
                                </th:block>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="exportFormat" class="form-label fw-bold">导出格式</label>
                            <select class="form-select" id="exportFormat" style="max-width:300px">
                                <option value="html">HTML（浏览器书签格式）</option>
                                <option value="csv">CSV</option>
                                <option value="json">JSON</option>
                            </select>
                        </div>

                        <button type="button" id="exportBtn" class="btn btn-primary">
                            <i class="bi bi-download"></i> 确认导出
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script>
        // 展开/收起树节点（点击整行）
        function toggleTreeNode(node) {
            var childrenDiv = node.nextElementSibling;
            if (!childrenDiv || !childrenDiv.classList.contains('tree-children')) return;
            var toggle = node.querySelector('.tree-toggle');
            if (childrenDiv.classList.contains('collapsed')) {
                childrenDiv.classList.remove('collapsed');
                childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
                if (toggle) toggle.classList.remove('collapsed');
            } else {
                childrenDiv.style.maxHeight = childrenDiv.scrollHeight + 'px';
                childrenDiv.offsetHeight;
                childrenDiv.style.maxHeight = '0px';
                childrenDiv.classList.add('collapsed');
                if (toggle) toggle.classList.add('collapsed');
            }
        }

        // 全选/取消全选
        document.getElementById('selectAll').addEventListener('change', function() {
            var checked = this.checked;
            document.querySelectorAll('.folder-check').forEach(function(cb) {
                cb.checked = checked;
            });
        });

        // 父级勾选/取消时同步子级，子级变化时同步父级
        document.querySelectorAll('.folder-check').forEach(function(cb) {
            cb.addEventListener('change', function() {
                // 1. 同步所有后代子节点
                var children = getChildrenCheckboxes(this);
                children.forEach(function(child) { child.checked = cb.checked; });

                // 2. 更新父级状态
                updateParentCheckbox(this);

                // 3. 更新全选状态
                updateSelectAll();
            });
        });

        // 获取当前 checkbox 后所有后代 tree-children 中的 checkbox
        function getChildrenCheckboxes(cb) {
            var result = [];
            var node = cb.closest('.tree-node');
            if (!node) return result;
            var childrenDiv = node.nextElementSibling;
            if (!childrenDiv || !childrenDiv.classList.contains('tree-children')) return result;
            // 递归收集所有子 tree-children 中的 checkbox
            collectCheckboxes(childrenDiv, result);
            return result;
        }

        function collectCheckboxes(container, result) {
            container.querySelectorAll('.tree-node').forEach(function(n) {
                var cb = n.querySelector('.folder-check');
                if (cb) result.push(cb);
                var sub = n.nextElementSibling;
                if (sub && sub.classList.contains('tree-children')) {
                    collectCheckboxes(sub, result);
                }
            });
        }

        // 向上更新父级 checkbox：同级全部选中则父选，否则取消
        function updateParentCheckbox(cb) {
            var node = cb.closest('.tree-node');
            // 找到包含当前节点的 tree-children 容器
            var parentContainer = node.closest('.tree-children');
            if (!parentContainer) return;
            // 找到这个容器前面的 tree-node（即父节点）
            var parentNode = parentContainer.previousElementSibling;
            if (!parentNode || !parentNode.classList.contains('tree-node')) return;
            var parentCb = parentNode.querySelector('.folder-check');
            if (!parentCb) return;

            // 检查当前容器内所有直接子 checkbox 是否全选
            var siblings = parentContainer.querySelectorAll(':scope > .tree-node > .folder-check');
            var allChecked = true;
            siblings.forEach(function(s) { if (!s.checked) allChecked = false; });
            parentCb.checked = allChecked;

            // 继续向上
            updateParentCheckbox(parentCb);
        }

        // 更新全选状态
        function updateSelectAll() {
            var all = document.querySelectorAll('.folder-check');
            var allChecked = true;
            all.forEach(function(c) { if (!c.checked) allChecked = false; });
            document.getElementById('selectAll').checked = allChecked;
        }

        // 确认导出
        document.getElementById('exportBtn').addEventListener('click', function() {
            var checked = document.querySelectorAll('.folder-check:checked');
            if (checked.length === 0) {
                alert('请至少选择一个文件夹');
                return;
            }
            var ids = [];
            checked.forEach(function(cb) { ids.push(cb.value); });
            var format = document.getElementById('exportFormat').value;
            var url = '/admin/tool/export/download?scope=all&format=' + format + '&folderIds=' + ids.join(',');
            window.location.href = url;
        });
    </script>
</body>
</html>
