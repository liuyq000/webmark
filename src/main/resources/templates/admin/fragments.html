<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- 顶部导航栏 Fragment -->
<nav th:fragment="header" class="navbar navbar-dark bg-dark fixed-top px-3" style="z-index:1040">
    <div class="d-flex align-items-center">
        <button class="btn btn-dark me-2" id="sidebarToggle"><i class="bi bi-list fs-5"></i></button>
        <a class="navbar-brand fw-bold" th:href="@{/admin/index}">
            <i class="bi bi-bookmark-star-fill"></i> 本地书签后台管理
        </a>
    </div>
    <div class="d-flex align-items-center gap-3 text-white">
        <span class="d-none d-md-inline small" id="currentTime"></span>
        <div class="dropdown">
            <a class="text-white text-decoration-none dropdown-toggle" href="#" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i> <span sec:authentication="name">管理员</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" th:href="@{/index}"><i class="bi bi-house"></i> 返回前台</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- 侧边栏 Fragment，activeMenu 参数指定高亮菜单 -->
<nav th:fragment="sidebar(activeMenu)" class="sidebar bg-dark text-white" id="sidebar">
    <div class="p-3 text-center border-bottom border-secondary">
        <div class="bg-primary bg-opacity-25 rounded-circle d-inline-flex align-items-center justify-content-center" style="width:60px;height:60px;">
            <i class="bi bi-person-fill fs-3"></i>
        </div>
        <p class="mb-0 mt-2 small" sec:authentication="name">管理员</p>
    </div>
    <ul class="nav flex-column py-2">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'bookmarks'} ? 'active'" th:href="@{/admin/bookmark/list}">
                <i class="bi bi-bookmarks"></i> 书签管理
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'icons'} ? 'active'" th:href="@{/admin/icon/list}">
                <i class="bi bi-emoji-smile"></i> 图标管理
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'collect'} ? 'active'" th:href="@{/admin/tool/collect}">
                <i class="bi bi-globe"></i> 网页收集工具
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'import'} ? 'active'" th:href="@{/admin/tool/import}">
                <i class="bi bi-upload"></i> 导入收藏夹
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activeMenu == 'export'} ? 'active'" th:href="@{/admin/tool/export}">
                <i class="bi bi-download"></i> 导出收藏夹
            </a>
        </li>
    </ul>
</nav>

</body>
</html>
