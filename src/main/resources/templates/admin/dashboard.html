<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 本地书签后台管理</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <!-- 顶部Header -->
    <nav th:replace="~{admin/fragments :: header}"></nav>

    <div class="d-flex" style="margin-top:56px">
        <!-- 左侧侧边栏 -->
        <nav th:replace="~{admin/fragments :: sidebar('index')}"></nav>

        <!-- 主内容区 -->
        <main class="content flex-grow-1 p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/index}">首页</a></li>
                    <li class="breadcrumb-item active">仪表盘</li>
                </ol>
            </nav>

            <!-- 统计卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                                <i class="bi bi-bookmark-fill text-primary fs-4"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">总书签数</p>
                                <h4 class="mb-0" th:text="${totalBookmarks}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-success bg-opacity-10 p-3 me-3">
                                <i class="bi bi-eye-fill text-success fs-4"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">公开书签</p>
                                <h4 class="mb-0" th:text="${publicBookmarks}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-info bg-opacity-10 p-3 me-3">
                                <i class="bi bi-people-fill text-info fs-4"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">注册用户</p>
                                <h4 class="mb-0" th:text="${totalUsers}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="rounded-circle bg-warning bg-opacity-10 p-3 me-3">
                                <i class="bi bi-calendar-plus text-warning fs-4"></i>
                            </div>
                            <div>
                                <p class="text-muted mb-0 small">今日新增</p>
                                <h4 class="mb-0" th:text="${todayNew}">0</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 热门书签 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0"><i class="bi bi-fire text-danger"></i> 热门书签 Top 10</h6>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:50px">#</th>
                                <th>名称</th>
                                <th>URL</th>

                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="bookmark,stat : ${hotBookmarks}">
                                <td th:text="${stat.index + 1}">1</td>
                                <td th:text="${bookmark.title}">名称</td>
                                <td><a th:href="${bookmark.url}" target="_blank" class="text-decoration-none small" th:text="${#strings.abbreviate(bookmark.url, 40)}">url</a></td>

                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
