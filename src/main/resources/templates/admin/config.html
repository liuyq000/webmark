<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - 本地书签后台</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{admin/fragments :: header}"></nav>
    <div class="d-flex" style="margin-top:56px">
        <nav th:replace="~{admin/fragments :: sidebar('index')}"></nav>
        <main class="content flex-grow-1 p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/index}">首页</a></li>
                    <li class="breadcrumb-item active">系统配置</li>
                </ol>
            </nav>
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white"><h6 class="mb-0">基本配置</h6></div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">站点名称</label>
                            <input type="text" class="form-control" value="本地书签">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">站点描述</label>
                            <textarea class="form-control" rows="2">发现和分享优质互联网资源</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">默认收藏夹</label>
                            <input type="text" class="form-control" placeholder="默认收藏夹名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ICP备案号</label>
                            <input type="text" class="form-control" placeholder="ICP备XXXXXXXX号">
                        </div>
                        <button type="submit" class="btn btn-primary">保存配置</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
