<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 本地书签后台</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <nav th:replace="~{admin/fragments :: header}"></nav>

    <div class="d-flex" style="margin-top:56px">
        <nav th:replace="~{admin/fragments :: sidebar('index')}"></nav>

        <main class="content flex-grow-1 p-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin/index}">首页</a></li>
                    <li class="breadcrumb-item active">用户列表</li>
                </ol>
            </nav>
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body py-2">
                    <form th:action="@{/admin/user/list}" method="get" class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <input type="text" name="keyword" class="form-control form-control-sm" placeholder="搜索用户名/邮箱" th:value="${keyword}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> 搜索</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>注册时间</th><th>操作</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${page.records}">
                                <td th:text="${item.id}">1</td>
                                <td th:text="${item.userName}">用户</td>
                                <td th:text="${item.email}">email</td>
                                <td>
                                    <span th:if="${item.role == 'ROLE_ADMIN'}" class="badge bg-danger">管理员</span>
                                    <span th:if="${item.role == 'ROLE_USER'}" class="badge bg-primary">用户</span>
                                </td>
                                <td class="small" th:text="${#temporals.format(item.createTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></button>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <small class="text-muted">共 <span th:text="${page.total}">0</span> 条</small>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${page.current <= 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/user/list(page=${page.current - 1}, keyword=${keyword})}">上一页</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}" th:classappend="${i == page.current} ? 'active'">
                                <a class="page-link" th:href="@{/admin/user/list(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${page.current >= page.pages} ? 'disabled'">
                                <a class="page-link" th:href="@{/admin/user/list(page=${page.current + 1}, keyword=${keyword})}">下一页</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
