# ==================== Webmark \u9ED8\u8BA4\u914D\u7F6E ====================
# \u6B64\u6587\u4EF6\u5305\u542B\u6240\u6709\u914D\u7F6E\u9879\u7684\u9ED8\u8BA4\u503C
# \u53EF\u901A\u8FC7 config-dev.properties / config-prod.properties \u6309\u73AF\u5883\u8986\u76D6

# \u5F53\u524D\u73AF\u5883\uFF08dev=\u5F00\u53D1\u73AF\u5883\uFF0Cprod=\u751F\u4EA7\u73AF\u5883\uFF09\uFF0C\u51B3\u5B9A\u52A0\u8F7D config-{env}.properties
# \u4E5F\u53EF\u901A\u8FC7\u73AF\u5883\u53D8\u91CF WEBMARK_ENV \u8986\u76D6
webmark.env=dev

# \u6570\u636E\u76EE\u5F55\uFF08\u5B58\u50A8\u7528\u6237\u3001\u4E66\u7B7E\u3001\u6587\u4EF6\u5939\u7B49 JSON \u6587\u4EF6\uFF09
webmark.dataDir=./data

# JSON \u6587\u4EF6\u662F\u5426\u7F8E\u5316\u8F93\u51FA\uFF08true=\u53EF\u8BFB\u6027\u597D\uFF0Cfalse=\u6587\u4EF6\u4F53\u79EF\u5C0F\uFF09
webmark.jsonPretty=true

# JWT \u5BC6\u94A5\uFF08\u751F\u4EA7\u73AF\u5883\u5EFA\u8BAE\u901A\u8FC7\u73AF\u5883\u53D8\u91CF WEBMARK_JWT_SECRET \u8BBE\u7F6E\uFF09
webmark.jwtSecret=webmark-jwt-secret-key-2024-min-32bytes!!

# JWT \u8BBF\u95EE\u4EE4\u724C\u6709\u6548\u671F\uFF08\u6BEB\u79D2\uFF09
webmark.jwtAccessExpiration=1800000

# JWT \u5237\u65B0\u4EE4\u724C\u6709\u6548\u671F\uFF08\u6BEB\u79D2\uFF09
webmark.jwtRefreshExpiration=604800000
